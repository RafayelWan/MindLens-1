<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分析结果 - Mind Lens</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <p id="displayQuestion" style="display:none;"></p>
  <div class="container">
    <h1>Mind Lens - 分析结果</h1>
    
    <div class="workspace">
      <!-- 左侧：对话容器 -->
      <div class="left-panel">
        <div id="chat-box" class="chat-box">
          <div class="chat-messages">
            <div id="ai-follow-up" class="ai-follow-up"></div>
          </div>
          <div class="status-container">
            <p id="status-message" class="status-message"></p>
          </div>
          <div class="chat-input-area" style="margin-top:auto;">
            <textarea id="user-reply" rows="1" placeholder="输入你的回复..."></textarea>
            <button id="send-btn" class="send-btn">发送</button>
          </div>
        </div>
        <div style="display:flex;gap:0.75rem;margin-top:0.33rem;">
          <a href="index.html" class="back-link small" style="flex:1;">重新输入问题</a>
          <button id="skip-btn" class="back-link small" style="flex:1;background:rgba(146,168,209,0.1);border:1px solid rgba(146,168,209,0.2);cursor:pointer;" onclick="skipToSuggestion()">直接给出建议</button>
        </div>
      </div>
      
      <!-- 右侧：AI 分析结果区域 -->
      <div class="right-panel">
        <div class="result-section">
          <h2 id="result-title" style="display:none;"></h2>
          <div id="analysis-container" class="analysis-container"></div>
        </div>
      </div>
      </div>
    </div>
  </div>
  
  <script>
    // 从URL获取问题参数并显示
    function getQueryParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }
    
    // 添加消息到对话区
    function addMessage(message, type) {
      const chatMessages = document.querySelector('.chat-messages');
      const messageDiv = document.createElement('div');
      messageDiv.className = type === 'user' ? 'user-message' : 'ai-message';
      messageDiv.innerHTML = `<p>${message}</p>`;
      chatMessages.appendChild(messageDiv);
      scrollToBottom();
    }
    
    // 显示状态消息
    function showStatusMessage(message) {
      const statusElement = document.getElementById('status-message');
      statusElement.textContent = message;
      statusElement.style.display = 'block';
    }
    
    // 隐藏状态消息
    function hideStatusMessage() {
      const statusElement = document.getElementById('status-message');
      statusElement.style.display = 'none';
    }
    
    // 滚动到底部
    function scrollToBottom() {
      const chatMessages = document.querySelector('.chat-messages');
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    // 自适应高度输入框
    function autoResizeTextarea(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
    }
    
    // 更新卡片
    function updateCards(data) {
      const container = document.getElementById('analysis-container');
      
      // 定义卡片数据映射
      const cardData = [
        { id: 'card-surface', title: '表层问题', content: data.cards?.surface },
        { id: 'card-assumption', title: '隐含假设', content: data.cards?.assumption },
        { id: 'card-info-gap', title: '信息缺失', content: data.cards?.info_gap },
        { id: 'card-blind-spot', title: '认知盲点', content: data.cards?.blind_spot },
        { id: 'card-suggestion', title: '最终建议', content: data.cards?.suggestion }
      ];
      
      // 检查容器是否已有卡片
      const existingCards = container.querySelectorAll('.analysis-item');
      
      if (existingCards.length === 0) {
        // 如果没有卡片，创建新卡片
        cardData.forEach((card, index) => {
          const cardElement = document.createElement('div');
          const isLocked = index === 4;
          cardElement.id = card.id;
          cardElement.className = `analysis-item ${isLocked ? 'locked' : ''}`;
          cardElement.innerHTML = `
            <h3>${card.title}</h3>
            <p>${card.content || ''}</p>
          `;
          container.appendChild(cardElement);
          
          // 添加动画效果
          setTimeout(() => {
            cardElement.classList.add('show');
          }, 10);
        });
      } else {
        // 如果已有卡片，更新内容
        cardData.forEach((card, index) => {
          const cardElement = existingCards[index];
          if (cardElement) {
            // 只更新非null的内容
            if (card.content !== null && card.content !== undefined) {
              const pElement = cardElement.querySelector('p');
              if (pElement) {
                pElement.textContent = card.content;
              }
            }
            
            // 处理建议卡片的解锁
            if (index === 4) {
              if (data.ready_for_suggestion === true && card.content) {
                cardElement.classList.remove('locked');
              } else {
                cardElement.classList.add('locked');
              }
            }
          }
        });
      }
    }
    
    async function skipToSuggestion() {
      const skipBtn = document.getElementById('skip-btn');
      const userReply = document.getElementById('user-reply');
      const sendBtn = document.getElementById('send-btn');

      addMessage('[请直接给出建议]', 'user');
      showStatusMessage('Mind Lens 正在生成建议...');
      skipBtn.disabled = true;
      userReply.disabled = true;
      sendBtn.disabled = true;

      try {
        await postSSE(
          '/api/analysis/reply',
          { message: '[请直接给出建议]' },
          (result) => {
            hideStatusMessage();
            updateCards(result);
            if (result.follow_up) addMessage(result.follow_up, 'ai');
            skipBtn.style.display = 'none';
          },
          (msg) => {
            hideStatusMessage();
            showError(msg);
          }
        );
      } catch (error) {
        console.error('跳过追问错误:', error);
        hideStatusMessage();
        showError('请求失败，请重试');
      } finally {
        skipBtn.disabled = false;
        userReply.disabled = false;
        sendBtn.disabled = false;
      }
    }

    // 通用 SSE 请求
    async function postSSE(url, body, onDone, onError) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        onError(err.detail || `请求失败 (${res.status})`);
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data:')) continue;
          const json = line.slice(5).trim();
          if (!json) continue;
          try {
            const event = JSON.parse(json);
            if (event.error) { onError(event.error); return; }
            if (event.done)  { onDone(event.result); return; }
          } catch (_) {}
        }
      }
    }

    function showError(message) {
      const chatMessages = document.querySelector('.chat-messages');
      const div = document.createElement('div');
      div.className = 'error-message';
      div.innerHTML = `<p style="color:#e74c3c;">${message}</p>`;
      chatMessages.appendChild(div);
      scrollToBottom();
    }

    // 页面初始化
    async function initPage() {
      const question = getQueryParam('question');
      if (!question) return;

      const decodedQuestion = decodeURIComponent(question);
      document.getElementById('displayQuestion').textContent = decodedQuestion;
      addMessage(decodedQuestion, 'user');
      showStatusMessage('Mind Lens 正在对该问题进行初始对焦...');

      try {
        await postSSE(
          '/api/analysis/start',
          { question: decodedQuestion },
          (result) => {
            hideStatusMessage();
            document.getElementById('result-title').style.display = '';
            updateCards(result);
            if (result.follow_up) addMessage(result.follow_up, 'ai');
          },
          (msg) => {
            hideStatusMessage();
            showError(msg);
          }
        );
      } catch (error) {
        console.error('启动分析错误:', error);
        hideStatusMessage();
        showError('后端服务暂时不可用，请检查连接');
      }
    }

    // 发送回复
    async function sendReply() {
      const userReply = document.getElementById('user-reply');
      const sendBtn = document.getElementById('send-btn');
      const reply = userReply.value.trim();
      if (!reply) return;

      addMessage(reply, 'user');
      userReply.value = '';
      autoResizeTextarea(userReply);
      showStatusMessage('Mind Lens 正在深度解析...');
      userReply.disabled = true;
      sendBtn.disabled = true;

      try {
        await postSSE(
          '/api/analysis/reply',
          { message: reply },
          (result) => {
            hideStatusMessage();
            updateCards(result);
            if (result.follow_up) addMessage(result.follow_up, 'ai');
          },
          (msg) => {
            hideStatusMessage();
            showError(msg);
          }
        );
      } catch (error) {
        console.error('发送回复错误:', error);
        hideStatusMessage();
        showError('后端服务暂时不可用，无法处理你的回复');
      } finally {
        userReply.disabled = false;
        sendBtn.disabled = false;
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      // 初始化页面
      initPage();
      
      // 绑定发送按钮事件
      const sendBtn = document.getElementById('send-btn');
      const userReply = document.getElementById('user-reply');
      
      sendBtn.addEventListener('click', sendReply);
      
      // 支持快捷键：Enter 发送，Shift+Enter 换行
      userReply.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendReply();
        } else if (e.key === 'Enter' && e.shiftKey) {
          // 允许换行
          setTimeout(() => {
            autoResizeTextarea(userReply);
          }, 0);
        }
      });
      
      // 监听输入事件，自动调整高度
      userReply.addEventListener('input', function() {
        autoResizeTextarea(userReply);
      });
    });
  </script>
</body>
</html>
