<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分析结果 - Mind Lens</title>
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
  <div class="container">
    <h1>Mind Lens - 分析结果</h1>
    
    <div class="workspace">
      <!-- 左侧：对话容器 -->
      <div class="left-panel">
        <div id="chat-box" class="chat-box">
          <div class="chat-messages">
            <div id="ai-follow-up" class="ai-follow-up">
              <!-- AI 追问将在这里显示 -->
            </div>
          </div>
          <div class="status-container">
            <p id="status-message" class="status-message"></p>
          </div>
          <div class="chat-input-area">
            <textarea id="user-reply" rows="1" placeholder="输入你的回复..."></textarea>
            <button id="send-btn" class="send-btn">发送</button>
          </div>
        </div>
        <div class="bottom-actions">
          <a href="index.html" class="back-link small">重新输入</a>
          <button id="skip-btn" class="skip-btn" style="display:none;">直接给建议</button>
        </div>
      </div>
      
      <!-- 右侧：AI 分析结果区域 -->
      <div class="right-panel">
        <div class="result-section">
          <h2>分析结果</h2>
          <div id="analysis-container" class="analysis-container">
            <!-- 分析结果将在这里逐条生成 -->
          </div>
          
          <!-- 对话记录区 -->
          <div id="chat-container" class="chat-container">
            <h3>对话记录</h3>
            <div class="chat-messages">
              <!-- 对话消息将在这里显示 -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // 从URL获取问题参数并显示
    function getQueryParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }
    
    // 添加消息到对话区
    function addMessage(message, type) {
      const chatMessages = document.querySelector('.chat-messages');
      const messageDiv = document.createElement('div');
      messageDiv.className = type === 'user' ? 'user-message' : 'ai-message';
      messageDiv.innerHTML = `<p>${message}</p>`;
      chatMessages.appendChild(messageDiv);
      scrollToBottom();
    }
    
    // 显示状态消息
    function showStatusMessage(message) {
      const statusElement = document.getElementById('status-message');
      statusElement.textContent = message;
      statusElement.style.display = 'block';
    }
    
    // 隐藏状态消息
    function hideStatusMessage() {
      const statusElement = document.getElementById('status-message');
      statusElement.style.display = 'none';
    }

    const CARD_FIELDS = ['surface', 'assumption', 'info_gap', 'blind_spot', 'suggestion'];
    const CARD_TITLES = ['表层问题', '隐含假设', '信息缺失', '认知盲点', '最终建议'];

    function initPlaceholderCards() {
      const container = document.getElementById('analysis-container');
      container.innerHTML = '';
      CARD_FIELDS.forEach((field, index) => {
        const el = document.createElement('div');
        el.id = `card-${field}`;
        el.className = `analysis-item ${index === 4 ? 'locked' : ''}`;
        el.innerHTML = `<h3>${CARD_TITLES[index]}</h3><p></p>`;
        container.appendChild(el);
        setTimeout(() => el.classList.add('show'), index * 80);
      });
    }

    function extractPartialCards(rawText) {
      const result = {};
      for (const field of CARD_FIELDS) {
        const re = new RegExp(`"${field}"\\s*:\\s*"((?:[^"\\\\]|\\\\.)*)"?`);
        const m = rawText.match(re);
        if (m) {
          result[field] = m[1]
            .replace(/\\n/g, '\n')
            .replace(/\\"/g, '"')
            .replace(/\\\\/g, '\\');
        }
      }
      return result;
    }

    function updateStreamingCards(partialCards) {
      for (const [field, content] of Object.entries(partialCards)) {
        const card = document.getElementById(`card-${field}`);
        if (!card) continue;
        const p = card.querySelector('p');
        if (p && p.textContent !== content) {
          p.textContent = content;
        }
      }
    }

    // 消费 SSE 流式响应，返回解析后的最终结果
    async function consumeSSE(url, body, onToken) {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (response.status === 401) {
        throw new Error('请先在首页配置 API Key');
      }
      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error || '请求失败');
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let finalResult = null;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop();

        for (const part of parts) {
          if (!part.startsWith('data: ')) continue;
          const payload = JSON.parse(part.slice(6));

          if (payload.error) {
            throw new Error(payload.error);
          } else if (payload.done) {
            finalResult = payload.result;
          } else if (payload.token) {
            onToken(payload.token);
          }
        }
      }

      return finalResult;
    }
    
    // 滚动到底部
    function scrollToBottom() {
      const chatMessages = document.querySelector('.chat-messages');
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    // 自适应高度输入框
    function autoResizeTextarea(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
    }
    
    // 更新卡片
    function updateCards(data) {
      const container = document.getElementById('analysis-container');
      
      // 定义卡片数据映射
      const cardData = [
        { id: 'card-surface', title: '表层问题', content: data.cards?.surface },
        { id: 'card-assumption', title: '隐含假设', content: data.cards?.assumption },
        { id: 'card-info-gap', title: '信息缺失', content: data.cards?.info_gap },
        { id: 'card-blind-spot', title: '认知盲点', content: data.cards?.blind_spot },
        { id: 'card-suggestion', title: '最终建议', content: data.cards?.suggestion }
      ];
      
      // 检查容器是否已有卡片
      const existingCards = container.querySelectorAll('.analysis-item');
      
      if (existingCards.length === 0) {
        // 如果没有卡片，创建新卡片
        cardData.forEach((card, index) => {
          const cardElement = document.createElement('div');
          const isLocked = index === 4;
          cardElement.id = card.id;
          cardElement.className = `analysis-item ${isLocked ? 'locked' : ''}`;
          cardElement.innerHTML = `
            <h3>${card.title}</h3>
            <p>${card.content || ''}</p>
          `;
          container.appendChild(cardElement);
          
          // 添加动画效果
          setTimeout(() => {
            cardElement.classList.add('show');
          }, 10);
        });
      } else {
        // 如果已有卡片，更新内容
        cardData.forEach((card, index) => {
          const cardElement = existingCards[index];
          if (cardElement) {
            // 只更新非null的内容
            if (card.content !== null && card.content !== undefined) {
              const pElement = cardElement.querySelector('p');
              if (pElement) {
                pElement.textContent = card.content;
              }
            }
            
            if (index === 4) {
              if (data.ready_for_suggestion === true) {
                cardElement.classList.remove('locked');
              }
            }
          }
        });
      }
    }
    
    async function tryResumeSession(decodedQuestion) {
      try {
        const memResp = await fetch('/api/memory');
        if (!memResp.ok) return false;
        const memory = await memResp.json();
        if (!Array.isArray(memory) || memory.length === 0) return false;

        const firstUserMsg = memory.find(m => m.role === 'user');
        if (!firstUserMsg || firstUserMsg.content !== decodedQuestion) return false;

        memory.forEach(m => addMessage(m.content, m.role === 'user' ? 'user' : 'ai'));

        const lastReply = [...memory].reverse().find(m => m.role === 'assistant');
        if (lastReply) {
          try {
            const data = JSON.parse(lastReply.content.replace(/```json\n?/g, '').replace(/```/g, ''));
            updateCards(data);
          } catch {
            updateCards({
              cards: { surface: '会话已恢复', assumption: '', info_gap: '', blind_spot: '', suggestion: '' },
              ready_for_suggestion: false
            });
          }
        }
        return true;
      } catch {
        return false;
      }
    }

    async function initPage() {
      const question = getQueryParam('question');
      if (question) {
        const decodedQuestion = decodeURIComponent(question);

        const sessionKey = 'mindlens_active_question';
        const isRefresh = sessionStorage.getItem(sessionKey) === decodedQuestion;

        if (isRefresh) {
          showStatusMessage('正在恢复会话...');
          const resumed = await tryResumeSession(decodedQuestion);
          hideStatusMessage();
          if (resumed) return;
        }

        sessionStorage.setItem(sessionKey, decodedQuestion);
        addMessage(decodedQuestion, 'user');
        showStatusMessage('Mind Lens 正在对该问题进行初始对焦...');

        initPlaceholderCards();

        try {
          let rawText = '';
          let rafPending = false;
          const data = await consumeSSE(
            '/api/analysis/start',
            { question: decodedQuestion },
            (token) => {
              rawText += token;
              if (!rafPending) {
                rafPending = true;
                requestAnimationFrame(() => {
                  updateStreamingCards(extractPartialCards(rawText));
                  rafPending = false;
                });
              }
            }
          );

          hideStatusMessage();
          if (data) {
            updateCards(data);
            if (data.follow_up) {
              addMessage(data.follow_up, 'ai');
              document.getElementById('skip-btn').style.display = '';
            }
            if (data.ready_for_suggestion) {
              document.getElementById('skip-btn').style.display = 'none';
            }
          }

        } catch (error) {
          console.error('启动分析错误:', error);
          hideStatusMessage();

          const chatMessages = document.querySelector('.chat-messages');
          const errorDiv = document.createElement('div');
          errorDiv.className = 'error-message';
          errorDiv.innerHTML = `<p>${error.message || '后端服务暂时不可用'}</p>`;
          chatMessages.appendChild(errorDiv);
          scrollToBottom();
        }
      }
    }
    
    // 发送回复
    async function sendReply() {
      const userReply = document.getElementById('user-reply');
      const sendBtn = document.getElementById('send-btn');
      const reply = userReply.value.trim();
      
      if (reply) {
        // 显示用户消息
        addMessage(reply, 'user');
        
        // 清空输入框并重置高度
        userReply.value = '';
        autoResizeTextarea(userReply);
        
        // 显示状态消息
        showStatusMessage('Mind Lens 正在深度解析...');
        
        // 禁用输入框和发送按钮
        userReply.disabled = true;
        sendBtn.disabled = true;
        
        try {
          let rawText = '';
          let rafPending = false;
          const data = await consumeSSE(
            '/api/analysis/reply',
            { message: reply },
            (token) => {
              rawText += token;
              if (!rafPending) {
                rafPending = true;
                requestAnimationFrame(() => {
                  updateStreamingCards(extractPartialCards(rawText));
                  rafPending = false;
                });
              }
            }
          );

          hideStatusMessage();

          if (data && data.error) {
            const chatMessages = document.querySelector('.chat-messages');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = `<p style="color: #e74c3c;">${data.error}</p>`;
            chatMessages.appendChild(errorDiv);
            scrollToBottom();
          } else if (data) {
            updateCards(data);
            if (data.follow_up) {
              addMessage(data.follow_up, 'ai');
              document.getElementById('skip-btn').style.display = '';
            }
            if (data.ready_for_suggestion) {
              document.getElementById('skip-btn').style.display = 'none';
            }
          }
          
        } catch (error) {
          console.error('发送回复错误:', error);
          
          hideStatusMessage();
          
          const chatMessages = document.querySelector('.chat-messages');
          const errorDiv = document.createElement('div');
          errorDiv.className = 'error-message';
          const errMsg = error.message || '后端服务暂时不可用，无法处理你的回复';
          errorDiv.innerHTML = `<p>${errMsg}</p>`;
          chatMessages.appendChild(errorDiv);
          scrollToBottom();
        } finally {
          // 恢复输入框和发送按钮的状态
          userReply.disabled = false;
          sendBtn.disabled = false;
        }
      }
    }

    async function skipToSuggestion() {
      const userReply = document.getElementById('user-reply');
      userReply.value = '[请直接给出建议]';
      await sendReply();
      document.getElementById('skip-btn').style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', function() {
      initPage();
      
      const sendBtn = document.getElementById('send-btn');
      const skipBtn = document.getElementById('skip-btn');
      const userReply = document.getElementById('user-reply');
      
      sendBtn.addEventListener('click', sendReply);
      skipBtn.addEventListener('click', skipToSuggestion);
      
      // 支持快捷键：Enter 发送，Shift+Enter 换行
      userReply.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendReply();
        } else if (e.key === 'Enter' && e.shiftKey) {
          // 允许换行
          setTimeout(() => {
            autoResizeTextarea(userReply);
          }, 0);
        }
      });
      
      // 监听输入事件，自动调整高度
      userReply.addEventListener('input', function() {
        autoResizeTextarea(userReply);
      });
    });
  </script>
</body>
</html>
