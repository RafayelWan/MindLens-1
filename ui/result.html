<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分析结果 - Mind Lens</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Mind Lens - 分析结果</h1>
    
    <div class="workspace">
      <!-- 左侧：问题上下文面板 -->
      <div class="left-panel">
        <div class="question-display">
          <h2>你的问题：</h2>
          <p id="displayQuestion"></p>
        </div>
        <a href="index.html" class="back-link">重新输入问题</a>
      </div>
      
      <!-- 右侧：AI 分析结果区域 -->
      <div class="right-panel">
        <div class="result-section">
          <h2>分析结果</h2>
          <div id="analysis-container" class="analysis-container">
            <!-- 分析结果将在这里逐条生成 -->
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // 从URL获取问题参数并显示
    function getQueryParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }
    
    function addAnalysisCard(title, content, delay) {
      setTimeout(() => {
        const container = document.getElementById('analysis-container');
        const card = document.createElement('div');
        card.className = 'analysis-item';
        card.innerHTML = `
          <h3>${title}</h3>
          <p>${content}</p>
        `;
        container.appendChild(card);
        
        // 添加动画效果
        setTimeout(() => {
          card.classList.add('show');
          // 自动滚动到最新卡片
          card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 10);
      }, delay);
    }
    
    async function callAI(question) {
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: question,
            prompt_name: 'mind_lens',
            stream: false
          })
        });

        if (!response.ok) throw new Error('AI 调用失败');

        const data = await response.json();
        return data.reply;
      } catch (error) {
        console.error('AI 调用错误:', error);
        return `1. 表层问题\n无法连接到后端服务。请确保已运行 python server.py\n\n2. 隐含假设\n-\n\n3. 信息缺失\n-\n\n4. 认知盲点\n-\n\n5. 建议\n请在终端运行: python server.py`;
      }
    }

    // 解析 AI 响应并生成分析卡片
    function parseAIResponse(response) {
      const sections = response.split('\n\n');
      const analysisData = [];

      sections.forEach(section => {
        const lines = section.split('\n');
        if (lines.length > 0) {
          const title = lines[0].replace(/^\d+\.\s*/, '');
          const content = lines.slice(1).join('\n').trim();
          if (title && content) {
            analysisData.push({ title, content });
          }
        }
      });

      return analysisData;
    }

    document.addEventListener('DOMContentLoaded', async function() {
      const question = getQueryParam('question');
      if (question) {
        document.getElementById('displayQuestion').textContent = decodeURIComponent(question);
        
        // 显示加载状态
        const container = document.getElementById('analysis-container');
        container.innerHTML = '<div style="text-align: center; padding: 2rem; color: #888;">正在分析...请稍候</div>';
        
        // 调用 AI 分析
        const aiResponse = await callAI(decodeURIComponent(question));
        const analysisData = parseAIResponse(aiResponse);
        
        // 清空容器并显示分析结果
        container.innerHTML = '';
        
        // 逐步生成分析卡片
        analysisData.forEach((item, index) => {
          addAnalysisCard(item.title, item.content, 500 + index * 500);
        });
      }
    });
  </script>
</body>
</html>
