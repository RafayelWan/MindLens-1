<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mind Lens</title>
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
  <div class="index-container">
    <button id="api-key-btn" class="api-key-btn" onclick="openApiKeyModal()">填写 API Key</button>
    <h1>Mind Lens</h1>
    <p class="subtitle">帮助你更清晰的理解和分析问题</p>

    <!-- API Key 弹窗 -->
    <div id="api-key-modal" class="modal-overlay" style="display:none;">
      <div class="modal-content">
        <h3>配置 API</h3>
        <div class="modal-field">
          <label for="api-url-input">API URL</label>
          <input type="text" id="api-url-input" placeholder="https://api.openai.com/v1" />
        </div>
        <div class="modal-field">
          <label for="api-key-input">API Key</label>
          <input type="password" id="api-key-input" placeholder="sk-..." />
        </div>
        <div class="modal-field">
          <label for="api-model-input">模型名称</label>
          <input type="text" id="api-model-input" placeholder="gpt-4o / deepseek-chat / ..." />
        </div>
        <p id="api-save-error" class="modal-error"></p>
        <div class="modal-actions">
          <button class="modal-cancel-btn" onclick="closeApiKeyModal()">取消</button>
          <button class="modal-save-btn" onclick="saveApiKey()">保存</button>
        </div>
      </div>
    </div>
    
    <div class="input-section">
      <label for="question">写下你正在困扰的问题</label>
      <textarea id="question" placeholder="例如：如何平衡工作和生活的关系？"></textarea>
      <button class="btn" onclick="analyzeQuestion()">分析问题</button>
    </div>
    
    <!-- 历史记录功能 -->
    <div class="history-section">
      <button class="history-toggle" onclick="toggleHistory()">历史记录</button>
      <div id="history-container" class="history-container">
        <h3>历史问题</h3>
        <div id="history-list" class="history-list">
          <!-- 历史记录将在这里显示 -->
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // 加载历史记录
    function loadHistory() {
      const history = JSON.parse(localStorage.getItem('mindLensHistory') || '[]');
      const historyList = document.getElementById('history-list');
      historyList.innerHTML = '';
      
      if (history.length === 0) {
        historyList.innerHTML = '<p class="no-history">暂无历史记录</p>';
        return;
      }
      
      history.forEach((item, index) => {
        const historyItem = document.createElement('div');
        historyItem.className = 'history-item';
        historyItem.innerHTML = `
          <p class="history-question">${item.question}</p>
          <p class="history-date">${item.date}</p>
        `;
        historyItem.onclick = () => loadHistoryItem(index);
        historyList.appendChild(historyItem);
      });
    }
    
    // 保存历史记录
    function saveHistory(question) {
      const history = JSON.parse(localStorage.getItem('mindLensHistory') || '[]');
      const newItem = {
        question: question,
        date: new Date().toLocaleString()
      };
      history.unshift(newItem);
      // 只保留最近10条记录
      if (history.length > 10) {
        history.pop();
      }
      localStorage.setItem('mindLensHistory', JSON.stringify(history));
    }
    
    // 加载历史记录项
    function loadHistoryItem(index) {
      const history = JSON.parse(localStorage.getItem('mindLensHistory') || '[]');
      if (history[index]) {
        document.getElementById('question').value = history[index].question;
        // 收起历史记录
        document.getElementById('history-container').style.display = 'none';
      }
    }
    
    // 切换历史记录显示/隐藏
    function toggleHistory() {
      const historyContainer = document.getElementById('history-container');
      if (historyContainer.style.display === 'none' || historyContainer.style.display === '') {
        historyContainer.style.display = 'block';
        loadHistory();
      } else {
        historyContainer.style.display = 'none';
      }
    }
    
    function analyzeQuestion() {
      const question = document.getElementById('question').value;
      if (question.trim() === '') {
        alert('请输入问题内容');
        return;
      }
      // 保存历史记录
      saveHistory(question);
      // 跳转到结果页面并传递问题内容
      window.location.href = `result.html?question=${encodeURIComponent(question)}`;
    }
    
    function openApiKeyModal() {
      document.getElementById('api-url-input').value = '';
      document.getElementById('api-key-input').value = '';
      document.getElementById('api-model-input').value = '';
      document.getElementById('api-save-error').textContent = '';
      document.getElementById('api-key-modal').style.display = 'flex';
    }

    function closeApiKeyModal() {
      document.getElementById('api-key-modal').style.display = 'none';
    }

    async function saveApiKey() {
      const url = document.getElementById('api-url-input').value.trim() || 'https://api.openai.com/v1';
      const key = document.getElementById('api-key-input').value.trim();
      const model = document.getElementById('api-model-input').value.trim() || 'gpt-4o';
      const errorEl = document.getElementById('api-save-error');
      errorEl.textContent = '';

      if (!key) {
        document.getElementById('api-key-input').focus();
        return;
      }

      const saveBtn = document.querySelector('.modal-save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';

      try {
        const resp = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ api_key: key, api_url: url, model: model }),
        });

        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          throw new Error(data.detail || '保存失败');
        }

        updateApiKeyBtn(true);
        closeApiKeyModal();
      } catch (err) {
        errorEl.textContent = err.message;
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = '保存';
      }
    }

    function updateApiKeyBtn(configured) {
      const btn = document.getElementById('api-key-btn');
      if (configured) {
        btn.textContent = 'API Key ✓';
        btn.classList.add('configured');
      } else {
        btn.textContent = '填写 API Key';
        btn.classList.remove('configured');
      }
    }

    async function checkApiConfig() {
      try {
        const resp = await fetch('/api/config/status');
        const data = await resp.json();
        updateApiKeyBtn(data.configured);
      } catch {
        updateApiKeyBtn(false);
      }
    }

    window.onload = function() {
      document.getElementById('history-container').style.display = 'none';

      document.getElementById('api-key-modal').addEventListener('click', function(e) {
        if (e.target === this) closeApiKeyModal();
      });

      checkApiConfig();
    };
  </script>
</body>
</html>
